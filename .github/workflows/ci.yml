name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (typecheck + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Font Awesome Pro ships from a private registry that requires an
      # auth token. Locally the repo relies on a gitignored .npmrc with
      # the token; CI has to recreate that file from a repo secret
      # before install, otherwise pnpm hits a 404 on any @fortawesome/pro-*
      # package. Add the token under repo Settings → Secrets and variables
      # → Actions → new secret named FONTAWESOME_TOKEN.
      - name: Configure Font Awesome Pro registry
        env:
          FONTAWESOME_TOKEN: ${{ secrets.FONTAWESOME_TOKEN }}
        run: |
          if [ -z "$FONTAWESOME_TOKEN" ]; then
            echo "::error::FONTAWESOME_TOKEN secret is not set. Add it under repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          {
            echo "@fortawesome:registry=https://npm.fontawesome.com/"
            echo "//npm.fontawesome.com/:_authToken=$FONTAWESOME_TOKEN"
          } > .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @utility-cis/shared exec prisma generate

      - name: Build shared package
        # The api and web packages import types from @utility-cis/shared; build it
        # first so TypeScript can resolve declaration files.
        run: pnpm --filter @utility-cis/shared build

      - name: Typecheck — shared
        run: pnpm --filter @utility-cis/shared exec tsc --noEmit

      - name: Typecheck — api
        run: pnpm --filter @utility-cis/api exec tsc --noEmit

      - name: Typecheck — web
        # The web package's own tsconfig.json already includes the
        # Next.js plugin which handles .next/types generation. The old
        # `--excludeFiles '.next/**'` flag was bogus — tsc has no such
        # option — and was hidden behind `continue-on-error: true`.
        run: pnpm --filter @utility-cis/web exec tsc --noEmit

      - name: Test — shared
        run: pnpm --filter @utility-cis/shared test

      - name: Test — api
        run: pnpm --filter @utility-cis/api test

      - name: Test — web
        # Web tests landed during the component-tests pass. They were
        # missing from the CI workflow, which is why regressions in the
        # web test suite weren't catching fire in CI until now.
        run: pnpm --filter @utility-cis/web test
