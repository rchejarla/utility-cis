name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (typecheck + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @utility-cis/shared exec prisma generate

      - name: Build shared package
        # The api and web packages import types from @utility-cis/shared; build it
        # first so TypeScript can resolve declaration files.
        run: pnpm --filter @utility-cis/shared build

      - name: Typecheck — shared
        run: pnpm --filter @utility-cis/shared exec tsc --noEmit

      - name: Typecheck — api
        run: pnpm --filter @utility-cis/api exec tsc --noEmit

      - name: Typecheck — web
        # .next/types are generated by `next build` and reference virtual route
        # files; exclude them from the standalone typecheck so CI doesn't fail
        # on stale route stubs.
        run: pnpm --filter @utility-cis/web exec tsc --noEmit --excludeFiles '.next/**'
        continue-on-error: true

      - name: Test — shared
        run: pnpm --filter @utility-cis/shared test

      - name: Test — api
        run: pnpm --filter @utility-cis/api test
